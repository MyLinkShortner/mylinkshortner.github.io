<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLinkShortener | Private Cloud Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #2563eb; --primary-soft: #eff6ff; --dark: #0f172a; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 100; position: sticky; top: 0; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
        .main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { background: white; width: 100%; max-width: 440px; padding: 2.5rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255,255,255,0.3); position: relative; overflow: hidden; }
        .tab-switcher { display: flex; background: var(--primary-soft); padding: 6px; border-radius: 12px; margin-bottom: 2rem; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; cursor: pointer; border-radius: 10px; color: var(--text-muted); font-size: 0.9rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
        h2 { font-size: 1.8rem; color: var(--dark); margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .social-btn { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; color: var(--dark); }
        .social-btn:hover { background: #f8fafc; transform: translateY(-2px); }
        .divider { margin: 1.5rem 0; display: flex; align-items: center; color: #cbd5e1; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 10px; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px var(--primary-soft); }
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1rem; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .submit-btn:hover { background: #1d4ed8; transform: scale(1.02); }
        footer { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
        footer a { color: var(--primary); text-decoration: none; font-weight: 600; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar animate__animated animate__fadeInDown">
        <a href="#" class="logo">MyLinkShortener</a>
        <div style="background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">PRIVATE CLOUD v2.4</div>
    </nav>

    <div class="main-wrapper">
        <div class="auth-card animate__animated animate__zoomIn">
            <div class="tab-switcher">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="header-text">
                <h2 id="title">Welcome Back</h2>
                <p class="subtitle" id="subtitle">Access your personal link management tools.</p>
            </div>

            <button class="social-btn" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                Continue with Google
            </button>

            <div class="divider">or secure email</div>

            <div class="form-group">
                <label>Developer Email</label>
                <input type="email" id="email" placeholder="dev@mylinkshortener.io">
            </div>
            <div class="form-group">
                <label>Security Key (Password)</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="submit-btn" id="submitBtn">Sign In</button>
        </div>
    </div>

    <footer class="animate__animated animate__fadeInUp">
        <p>&copy; 2026 MyLinkShortener. Enterprise Private Instance.</p>
        <div style="margin-top: 12px;">
            <a href="https://mylinkshortner.github.io/privacy.html" target="_blank">Privacy</a>
            <a href="https://mylinkshortner.github.io/terms.html" target="_blank">Terms</a>
            <a onclick="showSupport()">Support</a>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZ377dS4bKlcZDZm5FqoiFEFYoQC9jb2Q",
            authDomain: "vansh-98953.firebaseapp.com",
            databaseURL: "https://vansh-98953-default-rtdb.firebaseio.com",
            projectId: "vansh-98953",
            storageBucket: "vansh-98953.firebasestorage.app",
            messagingSenderId: "784796743834",
            appId: "1:784796743834:web:b4ca65fc00f6ce50ff0723",
            measurementId: "G-V4037GN0ZB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentMode = 'login';

        window.switchTab = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(mode === 'login') document.getElementById('loginTab').classList.add('active');
            else document.getElementById('signupTab').classList.add('active');
            
            const title = document.getElementById('title');
            const sub = document.getElementById('subtitle');
            const btn = document.getElementById('submitBtn');

            if(mode === 'signup') {
                title.innerText = "Create Account";
                sub.innerText = "Register and verify your developer workstation.";
                btn.innerText = "Create Developer ID";
            } else {
                title.innerText = "Welcome Back";
                sub.innerText = "Access your personal link management tools.";
                btn.innerText = "Sign In";
            }
        };

        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true
        });

        // Google Login
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                Toast.fire({ icon: 'success', title: 'Welcome ' + res.user.displayName });
                setTimeout(() => window.location.href = "dashboard.html", 2000);
            } catch (e) {
                Swal.fire('Error', 'Google login failed or domain not authorized.', 'error');
            }
        };

        // Email Login/Signup with Verification Logic
        document.getElementById('submitBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if(!email || !pass) return Swal.fire('Wait!', 'Email aur Password zaruri hai.', 'warning');

            try {
                if(currentMode === 'signup') {
                    // Create User
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    // Send Verification Email
                    await sendEmailVerification(userCredential.user);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Verify Your Email',
                        text: 'Aapki email par ek verification link bheja gaya hai. Link par click karne ke baad hi aap login kar payenge.',
                        confirmButtonColor: '#2563eb'
                    });
                    switchTab('login'); // Registration ke baad login page par bhejein
                } else {
                    // Login
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    
                    // Check if email is verified
                    if(userCredential.user.emailVerified) {
                        Toast.fire({ icon: 'success', title: 'Signed in successfully' });
                        setTimeout(() => window.location.href = "dashboard.html", 2000);
                    } else {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Email Not Verified',
                            text: 'Pehle apni email inbox check karein aur account verify karein.',
                            footer: '<a href="#" onclick="resendEmail()">Link nahi mila? Resend karein</a>'
                        });
                        auth.signOut(); // Verify nahi hai toh logout kar dein
                    }
                }
            } catch (e) {
                let msg = "Invalid Credentials or Network Issue.";
                if(e.code === 'auth/email-already-in-use') msg = "Ye email pehle se register hai.";
                if(e.code === 'auth/weak-password') msg = "Password kam se kam 6 characters ka hona chahiye.";
                Swal.fire('Failed', msg, 'error');
            }
        };

        // Resend Verification Functionality
        window.resendEmail = async () => {
            const user = auth.currentUser;
            if(user) {
                await sendEmailVerification(user);
                Swal.fire('Sent!', 'Verification link phir se bheja gaya hai.', 'success');
            } else {
                Swal.fire('Error', 'Pehle Sign up karein ya login detail bharein.', 'error');
            }
        }

        window.showSupport = () => {
            Swal.fire({
                title: 'Contact Support',
                html: 'Developer: DevVansh Labs <br> Email: support@vansh.github.io',
                confirmButtonColor: '#2563eb'
            });
        };
    </script>
</body>
</html>
