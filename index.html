<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLinkShortener | Private Cloud Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #2563eb; --primary-soft: #eff6ff; --dark: #0f172a; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
        .main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { background: white; width: 100%; max-width: 440px; padding: 2.5rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); position: relative; }
        .tab-switcher { display: flex; background: var(--primary-soft); padding: 6px; border-radius: 12px; margin-bottom: 2rem; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; cursor: pointer; border-radius: 10px; color: var(--text-muted); }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15); }
        h2 { font-size: 1.8rem; color: var(--dark); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .social-btn { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .divider { margin: 1.5rem 0; display: flex; align-items: center; color: #cbd5e1; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 10px; }
        .form-group { margin-bottom: 1.2rem; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; }
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        footer { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
        footer a { color: var(--primary); text-decoration: none; margin: 0 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar animate__animated animate__fadeInDown">
        <a href="#" class="logo">MyLinkShortener</a>
        <div style="background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">PRIVATE CLOUD v2.4</div>
    </nav>

    <div class="main-wrapper">
        <div class="auth-card animate__animated animate__zoomIn">
            <div class="tab-switcher">
                <button class="tab-btn active" id="loginTab">Login</button>
                <button class="tab-btn" id="signupTab">Sign Up</button>
            </div>

            <h2 id="title">Welcome Back</h2>
            <p class="subtitle" id="subtitle">Access your personal link management tools.</p>

            <button class="social-btn" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                Continue with Google
            </button>

            <div class="divider">or secure email</div>

            <div class="form-group">
                <label>Developer Email</label>
                <input type="email" id="email" placeholder="dev@mylinkshortener.io">
            </div>
            <div class="form-group">
                <label>Security Key (Password)</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="submit-btn" id="submitBtn">Sign In</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MyLinkShortener. Enterprise Private Instance.</p>
        <div style="margin-top: 12px;">
            <a href="https://mylinkshortner.github.io/privacy.html">Privacy</a>
            <a href="https://mylinkshortner.github.io/terms.html">Terms</a>
            <a onclick="showSupport()">Support</a>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZ377dS4bKlcZDZm5FqoiFEFYoQC9jb2Q",
            authDomain: "vansh-98953.firebaseapp.com",
            projectId: "vansh-98953",
            storageBucket: "vansh-98953.firebasestorage.app",
            messagingSenderId: "784796743834",
            appId: "1:784796743834:web:b4ca65fc00f6ce50ff0723"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let mode = 'login';

        // Tab Switch logic fix
        document.getElementById('loginTab').onclick = () => {
            mode = 'login';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('signupTab').classList.remove('active');
            document.getElementById('title').innerText = "Welcome Back";
            document.getElementById('submitBtn').innerText = "Sign In";
        };

        document.getElementById('signupTab').onclick = () => {
            mode = 'signup';
            document.getElementById('signupTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('title').innerText = "Create Account";
            document.getElementById('submitBtn').innerText = "Create Developer ID";
        };

        // GOOGLE LOGIN FIX
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                if(result.user) {
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                Swal.fire('Error', error.message, 'error');
            }
        });

        // EMAIL LOGIN/SIGNUP FIX
        document.getElementById('submitBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(!email || !pass) return Swal.fire('Error', 'Fields are empty!', 'error');

            try {
                if(mode === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    Swal.fire('Verify Email', 'Link sent to your inbox!', 'success');
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    if(res.user.emailVerified) {
                        window.location.href = "dashboard.html";
                    } else {
                        Swal.fire('Verify', 'Please verify your email first!', 'warning');
                    }
                }
            } catch (error) {
                Swal.fire('Auth Failed', error.message, 'error');
            }
        };

        window.showSupport = () => Swal.fire('Support', 'Contact: support@vansh.github.io', 'info');
    </script>
</body>
</html>
