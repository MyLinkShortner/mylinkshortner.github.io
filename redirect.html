<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            color: #0f172a;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .url {
            color: #64748b;
            font-size: 0.8rem;
            word-break: break-all;
        }

        .manual-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #2563eb;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .manual-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="message">Redirecting you...</div>
        <div class="url" id="urlDisplay"></div>
        <a href="#" id="manualLink" class="manual-link" style="display: none;">Click here if not redirected</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABekPzR4zxlY8rws16hyYNmFlMXBcggXk",
            authDomain: "vansh-98953.firebaseapp.com",
            projectId: "vansh-98953",
            storageBucket: "vansh-98953.firebasestorage.app",
            messagingSenderId: "784796743834",
            appId: "1:784796743834:web:b4ca65fc00f6ce50ff0723"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function handleRedirect() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                document.querySelector('.message').innerHTML = 'Invalid link';
                document.querySelector('.spinner').style.display = 'none';
                return;
            }
            
            try {
                const linkRef = doc(db, "links", id);
                const linkSnap = await getDoc(linkRef);
                
                if (!linkSnap.exists()) {
                    document.querySelector('.message').innerHTML = 'Link not found';
                    document.querySelector('.spinner').style.display = 'none';
                    return;
                }
                
                const linkData = linkSnap.data();
                
                if (linkData.retracted === true) {
                    document.querySelector('.message').innerHTML = 'This link has been retracted';
                    document.querySelector('.spinner').style.display = 'none';
                    return;
                }
                
                if (linkData.expiryDate && new Date(linkData.expiryDate) < new Date()) {
                    document.querySelector('.message').innerHTML = 'This link has expired';
                    document.querySelector('.spinner').style.display = 'none';
                    return;
                }
                
                await updateDoc(linkRef, {
                    clicks: increment(1),
                    lastClicked: new Date().toISOString()
                });
                
                const targetUrl = linkData.longUrl;
                document.getElementById('urlDisplay').innerHTML = targetUrl;
                
                const manualLink = document.getElementById('manualLink');
                manualLink.href = targetUrl;
                manualLink.style.display = 'inline-block';
                manualLink.innerHTML = 'Go to destination';
                
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 2000);
                
            } catch (error) {
                console.error(error);
                document.querySelector('.message').innerHTML = 'Something went wrong';
                document.querySelector('.spinner').style.display = 'none';
            }
        }
        
        handleRedirect();
    </script>
</body>
</html>
