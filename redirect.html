<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting | MyLinkShortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .redirect-card {
            background: white;
            border-radius: 40px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon i {
            font-size: 2.5rem;
            color: white;
        }

        h2 {
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .message {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: progress 3s linear forwards;
        }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }

        .manual-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #f1f5f9;
            color: #667eea;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .manual-link:hover {
            background: #667eea;
            color: white;
        }

        .error-icon {
            background: #fee2e2;
        }

        .error-icon i {
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="redirect-card" id="redirectCard">
        <div class="icon" id="icon">
            <i class="fas fa-link"></i>
        </div>
        <h2 id="title">Processing Redirect</h2>
        <p class="message" id="message">Verifying link and checking security protocols...</p>
        <div class="spinner" id="spinner"></div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill"></div>
        </div>
        <a href="#" id="manualLink" class="manual-link" style="display: none;">
            <i class="fas fa-external-link-alt"></i> Click here if not redirected
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABekPzR4zxlY8rws16hyYNmFlMXBcggXk",
            authDomain: "vansh-98953.firebaseapp.com",
            projectId: "vansh-98953",
            storageBucket: "vansh-98953.firebasestorage.app",
            messagingSenderId: "784796743834",
            appId: "1:784796743834:web:b4ca65fc00f6ce50ff0723"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function handleRedirect() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                showError('Invalid Link', 'No link ID provided');
                return;
            }
            
            try {
                const linkRef = doc(db, "links", id);
                const linkSnap = await getDoc(linkRef);
                
                if (!linkSnap.exists()) {
                    showError('Link Not Found', 'This link does not exist or has been removed');
                    return;
                }
                
                const linkData = linkSnap.data();
                
                // Check if link is retracted
                if (linkData.retracted === true) {
                    showError('Link Retracted', 'This link has been retracted by the owner and is no longer active');
                    return;
                }
                
                // Check if link is expired
                if (linkData.expiryDate && new Date(linkData.expiryDate) < new Date()) {
                    showError('Link Expired', 'This link has expired and is no longer valid');
                    return;
                }
                
                // Update click count
                await updateDoc(linkRef, {
                    clicks: increment(1),
                    lastClicked: new Date().toISOString()
                });
                
                const targetUrl = linkData.longUrl;
                const domain = new URL(targetUrl).hostname;
                
                document.getElementById('message').innerHTML = `<i class="fas fa-check-circle"></i> Redirecting to ${domain}...`;
                document.getElementById('title').innerHTML = 'Redirecting...';
                
                const manualLink = document.getElementById('manualLink');
                manualLink.href = targetUrl;
                manualLink.style.display = 'inline-block';
                manualLink.innerHTML = `<i class="fas fa-external-link-alt"></i> Go to ${domain}`;
                
                // Auto redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 3000);
                
            } catch (error) {
                console.error(error);
                showError('Connection Error', 'Unable to process your request. Please try again.');
            }
        }
        
        function showError(title, message) {
            document.getElementById('icon').className = 'icon error-icon';
            document.getElementById('icon').innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            document.getElementById('title').innerHTML = title;
            document.getElementById('message').innerHTML = message;
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 5000);
        }
        
        handleRedirect();
    </script>
</body>
</html>
